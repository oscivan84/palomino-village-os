version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: palomino_village_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/palomino_village_os
      JWT_SECRET: dev-jwt-secret-change-in-prod
      QR_HMAC_SECRET: dev-qr-hmac-secret-change-in-prod
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      GPS_MAX_DISTANCE_METERS: 100
    depends_on:
      - db

volumes:
  pgdata:
