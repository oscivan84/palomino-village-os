# render.yaml — Blueprint para Render.com (alternativa a Railway)
databases:
  - name: palomino-db
    databaseName: palomino_village_os
    plan: free
    ipAllowList: []

services:
  - type: web
    name: palomino-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: palomino-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: QR_HMAC_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://frontend-theta-wheat-29.vercel.app
      - key: GPS_MAX_DISTANCE_METERS
        value: 100
